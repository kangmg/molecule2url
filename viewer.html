<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #container { width: 100%; height: 100%; }
    #error {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      text-align: center;
      background: rgba(0,0,0,0.7);
      padding: 1.5rem 2rem;
      border-radius: 8px;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #adb5bd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="container"></div>
  <div id="error"></div>
  <script src="https://cdn.jsdelivr.net/gh/kangmg/aseview@main/aseview/static/js/aseview.js"></script>
  <script>
    const p = new URLSearchParams(location.search);
    const molecule = p.get('molecule');
    const theme = p.get('theme') || 'simple';

    const FLOAT_PARAMS = ['atomSize', 'bondThreshold', 'bondThickness', 'radiusContrast', 'animationSpeed', 'forceScale', 'hBondThreshold', 'polyhedronOpacity', 'ringOpacity'];
    const BOOL_PARAMS  = ['showCell', 'showBond', 'showHBond', 'showAxis', 'showShading', 'showConstraint', 'showEnergyPlot', 'showForceMaxPlot', 'showForces', 'showPolyhedron', 'showRings'];
    const STR_PARAMS   = ['style', 'backgroundColor', 'cellColor', 'colorBy', 'viewMode', 'rotationMode', 'radiusContrastMode', 'colorScheme'];

    const settings = {};
    FLOAT_PARAMS.forEach(k => { if (p.has(k)) settings[k] = parseFloat(p.get(k)); });
    BOOL_PARAMS.forEach(k  => { if (p.has(k)) settings[k] = p.get(k) === 'true'; });
    STR_PARAMS.forEach(k   => { if (p.has(k)) settings[k] = p.get(k); });

    function parseXYZ(text) {
      const frames = [];
      const lines = text.split('\n');
      let i = 0;
      while (i < lines.length) {
        while (i < lines.length && !lines[i].trim()) i++;
        if (i >= lines.length) break;
        const n = parseInt(lines[i].trim(), 10);
        if (isNaN(n) || n <= 0) break;
        if (i + 1 + n >= lines.length) break;
        const symbols = [], positions = [];
        for (let j = 0; j < n; j++) {
          const parts = lines[i + 2 + j].trim().split(/\s+/);
          if (parts.length < 4) continue;
          symbols.push(parts[0]);
          positions.push([parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3])]);
        }
        frames.push({ symbols, positions });
        i += 2 + n;
      }
      return frames;
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    if (!molecule) {
      showError('No molecule specified.');
    } else {
      const viewer = new ASEView.MolecularViewer('#container', { theme });

      fetch('molecules/' + molecule + '.xyz')
        .then(r => {
          if (!r.ok) throw new Error('Molecule not found: ' + molecule);
          return r.text();
        })
        .then(text => {
          const frames = parseXYZ(text);
          if (!frames.length) throw new Error('Failed to parse XYZ: ' + molecule);
          document.getElementById('loading').style.display = 'none';
          viewer.setData(frames);
          if (Object.keys(settings).length) viewer.setSettings(settings);
        })
        .catch(err => showError(err.message));
    }
  </script>
</body>
</html>
